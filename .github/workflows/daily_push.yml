name: Daily GitHub Hotlist Push

on:
  schedule:
    # Austin 11:30 can be 16:30 UTC (CDT) or 17:30 UTC (CST).
    - cron: "30 16 * * *"
    - cron: "30 17 * * *"
  workflow_dispatch:

jobs:
  send-daily-hotlist:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate by Austin local time
        id: schedule_gate
        run: |
          now_local=$(TZ=America/Chicago date +%H:%M)
          echo "Austin local time now: $now_local"
          if [[ "$now_local" > "11:24" && "$now_local" < "11:41" ]]; then
            echo "::notice::Within Austin send window (11:25-11:40), sending email."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Outside Austin send window, skip sending."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run daily push script
        if: ${{ github.event_name == 'workflow_dispatch' || steps.schedule_gate.outputs.run == 'true' }}
        env:
          GITHUB_TRENDING_URL: ${{ secrets.GITHUB_TRENDING_URL }}
          REQUEST_TIMEOUT_SECONDS: ${{ secrets.REQUEST_TIMEOUT_SECONDS }}
          GITHUB_TOKEN: ${{ github.token }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          missing=0
          for key in SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASSWORD EMAIL_FROM EMAIL_TO; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          python main.py
